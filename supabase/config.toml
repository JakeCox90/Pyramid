# Supabase project configuration
# Project URLs are safe to commit. Keys are NOT — use environment variables.
# See .env.example for required environment variables.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17
# seed_paths = ["./seed/dev_seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "com.pyramid.app://login-callback"
additional_redirect_urls = ["com.pyramid.app://login-callback", "com.pyramid.app://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# External OAuth providers for local dev (supabase start).
# To enable locally: set enabled = true and provide credentials from
# Apple Developer Console / Google Cloud Console.
# For hosted dev/prod, configure providers in the Supabase dashboard.
[auth.external.apple]
enabled = false
client_id = ""
secret = ""

[auth.external.google]
enabled = false
client_id = ""
secret = ""

# ─── Edge Functions — JWT verification strategy ───────────────────────────────
#
# verify_jwt = false for ALL functions. This is intentional:
#
# Why: Supabase gateway only verifies HS256 tokens (anon/service-role keys).
# Our user JWTs are signed with ES256 (Supabase Auth default). The gateway
# would reject all user requests with a 401 if verify_jwt were true.
#
# How auth is enforced instead:
#   - User-facing functions: call getUser() internally, which validates ES256 JWTs
#   - Service-role functions: check Authorization header for service role key
#     via requireServiceRole() (see _shared/supabase.ts)
#   - Cron functions: same requireServiceRole() guard — Supabase cron scheduler
#     sends the service role key automatically
#
# Security layers beyond JWT:
#   - CORS allowlist: only approved origins get Access-Control-Allow-Origin
#   - Security headers: X-Content-Type-Options, X-Frame-Options, HSTS, Referrer-Policy
#   - Input validation: UUID format, integer bounds, string sanitization, amount caps
#
# ─── User-facing functions (iOS app → getUser() auth) ─────────────────────────

[functions.create-league]
verify_jwt = false

[functions.join-league]
verify_jwt = false

[functions.join-paid-league]
verify_jwt = false

[functions.submit-pick]
