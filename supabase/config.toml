# Supabase project configuration
# Project URLs are safe to commit. Keys are NOT — use environment variables.
# See .env.example for required environment variables.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "pyramid://localhost"
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Edge Functions — disable gateway JWT verification.
# Our functions validate auth internally via getUser(), which supports ES256 JWTs.
# The gateway only verifies HS256 (anon/service-role), rejecting user JWTs signed with ES256.
[functions.create-league]
verify_jwt = false

[functions.join-league]
verify_jwt = false

[functions.join-paid-league]
verify_jwt = false

[functions.submit-pick]
verify_jwt = false

[functions.get-wallet]
verify_jwt = false

[functions.top-up]
verify_jwt = false

[functions.request-withdrawal]
verify_jwt = false

[functions.register-device-token]
verify_jwt = false

# Service-role-only functions — these also validate auth internally
[functions.settle-picks]
verify_jwt = false

[functions.credit-winnings]
verify_jwt = false

[functions.distribute-prizes]
verify_jwt = false

[functions.refund-stake]
verify_jwt = false

[functions.process-dispute-window]
verify_jwt = false

[functions.poll-live-scores]
verify_jwt = false

[functions.sync-fixtures]
verify_jwt = false

