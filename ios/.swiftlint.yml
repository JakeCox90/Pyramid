included:
  - Pyramid/Sources

excluded:
  - Pyramid/Sources/App/PyramidApp.swift  # @main requires minimal body

disabled_rules:
  - todo    # TODOs allowed during early development
  - nesting # DS namespace intentionally nests Color.DS.Brand etc.
  - implicit_optional_initialization

opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - overridden_super_call
  - redundant_nil_coalescing
  - private_outlet
  - attributes
  - vertical_parameter_alignment_on_call

line_length:
  warning: 120
  error: 150

type_body_length:
  warning: 200
  error: 300

file_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 80

identifier_name:
  min_length: 1

type_name:
  min_length: 2
