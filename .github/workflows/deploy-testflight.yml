name: Deploy to TestFlight

# ─── Manual-only TestFlight deployment ────────────────────────────────────────
# Archives the iOS app and uploads to TestFlight via App Store Connect API.
# Requires approval from the "production" GitHub Environment.
#
# Code signing uses manual certificate/profile import from GitHub Secrets.
# The workflow creates a temporary keychain, imports the cert + profile,
# archives with Release config, and uploads via xcodebuild -exportArchive
# with App Store Connect API key authentication.
#
# Required GitHub Secrets:
#   APPLE_TEAM_ID                  — Apple Developer Team ID
#   APP_STORE_CONNECT_API_KEY_ID   — App Store Connect API key ID
#   APP_STORE_CONNECT_ISSUER_ID    — App Store Connect issuer ID
#   APP_STORE_CONNECT_API_KEY_P8   — Base64-encoded .p8 API key file
#   APPLE_CERTIFICATE_P12          — Base64-encoded distribution certificate (.p12)
#   APPLE_CERTIFICATE_PASSWORD     — Password for the .p12 certificate
#   APPLE_PROVISIONING_PROFILE     — Base64-encoded provisioning profile (.mobileprovision)
#   SUPABASE_URL_PROD              — Production Supabase URL (https://cracvbokmvryhhclzxxw.supabase.co)
#   SUPABASE_ANON_KEY_PROD         — Production Supabase anon key
#
# Version strategy:
#   MARKETING_VERSION = user-facing version (1.0.0, 1.1.0, etc.)
#   BUILD_NUMBER = auto-incremented from GitHub Actions run number

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "App version (e.g. 1.0.0)"
        required: true
        type: string
        default: "1.0.0"
      confirm:
        description: "Type 'deploy-testflight' to confirm"
        required: true
        type: string

concurrency:
  group: deploy-testflight
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        env:
          CONFIRM_INPUT: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM_INPUT" != "deploy-testflight" ]; then
            echo "::error::Confirmation failed. Expected 'deploy-testflight'."
            exit 1
          fi

      - name: Validate version format
        env:
          VERSION_INPUT: ${{ inputs.marketing_version }}
        run: |
          if ! echo "$VERSION_INPUT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be semver (e.g. 1.0.0)"
            exit 1
          fi

  build-and-upload:
    name: Build & Upload to TestFlight
    needs: validate
    runs-on: macos-14
    timeout-minutes: 30
    environment: production

    env:
      MARKETING_VERSION: ${{ inputs.marketing_version }}
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/xcodegen
          key: brew-xcodegen-${{ runner.os }}

      - name: Install tools
        run: |
          brew install xcodegen
          gem install xcpretty

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Resolve SPM dependencies
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Pyramid.xcodeproj \
            -scheme Pyramid

      - name: Write Release xcconfig (production credentials)
        working-directory: ios/Config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_PROD }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_PROD }}
        run: |
          cat > Release.xcconfig <<'XCEOF'
          SUPABASE_URL = $(SUPABASE_URL_VALUE)
          SUPABASE_ANON_KEY = $(SUPABASE_ANON_KEY_VALUE)
          PAID_FEATURES_ENABLED = NO
          OTHER_SWIFT_FLAGS = $(inherited)
          XCEOF
          sed -i '' "s|\\$(SUPABASE_URL_VALUE)|${SUPABASE_URL}|" Release.xcconfig
          sed -i '' "s|\\$(SUPABASE_ANON_KEY_VALUE)|${SUPABASE_ANON_KEY}|" Release.xcconfig

      - name: Install Apple certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          # Install provisioning profile
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo -n "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Decode the profile plist to a temp file for reliable UUID extraction
          DECODED_PLIST="$RUNNER_TEMP/profile_decoded.plist"
          security cms -D -i "$PROFILE_PATH" > "$DECODED_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$DECODED_PLIST")
          if [ -z "$PROFILE_UUID" ]; then
            echo "::error::Failed to extract UUID from provisioning profile"
            exit 1
          fi

          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID.mobileprovision"
          echo "Certificate and profile installed successfully (profile UUID: $PROFILE_UUID)"

      - name: Patch exportOptions.plist with team ID
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          /usr/libexec/PlistBuddy -c \
            "Set :teamID $APPLE_TEAM_ID" exportOptions.plist

      - name: Create App Store Connect API key file
        env:
          ASC_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo -n "$ASC_API_KEY_P8" | base64 --decode \
            > "$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

      - name: Archive app
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Pyramid.xcodeproj \
            -scheme Pyramid \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Pyramid.xcarchive" \
            -xcconfig Config/Release.xcconfig \
            MARKETING_VERSION="${MARKETING_VERSION}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Pyramid Distribution" \
            | xcpretty

      - name: Export and upload to TestFlight
        working-directory: ios
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Pyramid.xcarchive" \
            -exportOptionsPlist exportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -allowProvisioningUpdates \
            | xcpretty
          echo "IPA exported and uploaded to TestFlight"

      - name: Tag successful upload
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="testflight-v${MARKETING_VERSION}-b${BUILD_NUMBER}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged: $TAG"

      - name: Clean up keychain and keys
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -rf "$RUNNER_TEMP/private_keys" "$RUNNER_TEMP/certificate.p12" \
            "$RUNNER_TEMP/profile.mobileprovision" "$RUNNER_TEMP/profile_decoded.plist"

      - name: Deployment summary
        run: |
          echo "## TestFlight Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${MARKETING_VERSION} (${BUILD_NUMBER})" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** testflight-v${MARKETING_VERSION}-b${BUILD_NUMBER}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** $(git rev-parse --short HEAD)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The build will appear in TestFlight within ~15 minutes after processing." >> "$GITHUB_STEP_SUMMARY"
