name: Copilot Auto Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-copilot-review:
    if: github.event.pull_request.user.login != 'copilot'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Request Copilot review
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const requestReview = async () => {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ['copilot']
              });
            };

            const addAssignee = async () => {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: pull_number,
                assignees: ['copilot']
              });
            };

            try {
              await requestReview();
              core.info('Requested Copilot review.');
            } catch (error) {
              if (error.status === 422) {
                core.info(`Copilot reviewer request skipped: ${error.message}`);
              } else {
                throw error;
              }
            }

            try {
              await addAssignee();
              core.info('Assigned Copilot to the pull request.');
            } catch (error) {
              if (error.status === 422) {
                core.info(`Copilot assignment skipped: ${error.message}`);
              } else {
                throw error;
              }
            }
