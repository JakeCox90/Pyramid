name: Deploy Edge Functions

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      function:
        description: 'Function name to deploy (or "all" for all functions)'
        required: true
        default: 'all'
      project_ref:
        description: 'Supabase project ref'
        required: true
        default: 'qvmzmeizluqcdkcjsqyd'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF=${{ github.event.inputs.project_ref || 'qvmzmeizluqcdkcjsqyd' }}
          supabase functions deploy --project-ref $PROJECT_REF
