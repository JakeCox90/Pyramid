name: Deploy Edge Functions (Dev)

# ─── Automatic dev deployment ─────────────────────────────────────────────────
# Deploys to the DEV Supabase project on every push to main.
# For production deployment, use deploy-functions-prod.yml (manual trigger).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set ENVIRONMENT=dev --project-ref qvmzmeizluqcdkcjsqyd
          supabase secrets set SENTRY_DSN_EDGE=${{ secrets.SENTRY_DSN_EDGE_DEV }} --project-ref qvmzmeizluqcdkcjsqyd

      - name: Deploy user-facing Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        # User-facing functions: called by the iOS app with a user JWT.
        # --no-verify-jwt is required because Supabase gateway only verifies
        # HS256 (anon/service-role keys), but user JWTs are signed with ES256.
        # Auth is enforced internally via getUser() in each function.
        run: |
          for fn in create-league join-league join-paid-league submit-pick get-wallet top-up request-withdrawal register-device-token update-profile update-league validate-league-content leave-league get-league-stats reset-dev-data; do
            echo "Deploying $fn (user-facing)..."
            supabase functions deploy "$fn" --no-verify-jwt --project-ref qvmzmeizluqcdkcjsqyd
          done

      - name: Deploy service-role Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        # Service-role functions: called internally by other functions or cron.
        # --no-verify-jwt is required because these use service-role key auth
        # (checked internally via requireServiceRole()), not gateway JWT.
        run: |
          for fn in settle-picks credit-winnings distribute-prizes refund-stake process-dispute-window poll-live-scores sync-fixtures sync-odds get-head-to-head generate-gameweek-story health; do
            echo "Deploying $fn (service-role)..."
            supabase functions deploy "$fn" --no-verify-jwt --project-ref qvmzmeizluqcdkcjsqyd
          done
