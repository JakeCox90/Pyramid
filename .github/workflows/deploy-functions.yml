name: Deploy Edge Functions (Dev)

# ─── Automatic dev deployment ─────────────────────────────────────────────────
# Deploys to the DEV Supabase project on every push to main.
# For production deployment, use deploy-functions-prod.yml (manual trigger).
#
# Function list is read from supabase/functions/manifest.json — add new
# functions there, not here.
#
# Required GitHub Secrets:
#   SUPABASE_ACCESS_TOKEN    — Supabase Management API token
#   SUPABASE_PROJECT_REF_DEV — Dev project ref

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_DEV }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 1.207.9

      - name: Validate project ref
        run: |
          if [ -z "$PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF_DEV secret is not set"
            exit 1
          fi

      - name: Set Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set ENVIRONMENT=dev --project-ref "$PROJECT_REF"
          supabase secrets set SENTRY_DSN_EDGE=${{ secrets.SENTRY_DSN_EDGE_DEV }} --project-ref "$PROJECT_REF"

      - name: Deploy all Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        # All functions use --no-verify-jwt because:
        # - User-facing: Supabase gateway only verifies HS256 (anon/service-role),
        #   but user JWTs are ES256. Auth enforced internally via getUser().
        # - Service-role: Auth checked internally via requireServiceRole().
        run: |
          MANIFEST="supabase/functions/manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Manifest not found at $MANIFEST"
            exit 1
          fi

          # Dev deploys ALL functions (user + service + dev-only)
          FUNCTIONS=$(jq -r '.functions | keys[]' "$MANIFEST")
          TOTAL=$(echo "$FUNCTIONS" | wc -l | tr -d ' ')
          echo "Deploying $TOTAL functions to dev..."

          FAILED=()
          for fn in $FUNCTIONS; do
            AUTH=$(jq -r ".functions[\"$fn\"].auth" "$MANIFEST")
            echo "Deploying $fn ($AUTH)..."
            if ! supabase functions deploy "$fn" --no-verify-jwt --project-ref "$PROJECT_REF"; then
              echo "::error::Failed to deploy $fn"
              FAILED+=("$fn")
            fi
          done

          echo ""
          echo "Deployed: $((TOTAL - ${#FAILED[@]}))/$TOTAL"

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed to deploy: ${FAILED[*]}"
            exit 1
          fi
