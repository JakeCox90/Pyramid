name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
          key: brew-xcodegen-${{ runner.os }}

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Write dev xcconfig (CI secrets)
        working-directory: ios/Config
        run: |
          echo "SUPABASE_URL = ${{ secrets.SUPABASE_URL_DEV }}" > Debug.xcconfig
          echo "SUPABASE_ANON_KEY = ${{ secrets.SUPABASE_ANON_KEY_DEV }}" >> Debug.xcconfig
          echo "SENTRY_DSN = ${{ secrets.SENTRY_DSN_IOS_DEV }}" >> Debug.xcconfig

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ios/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('ios/project.yml', 'ios/Pyramid/Sources/**/*.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Build for testing
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Pyramid.xcodeproj \
            -scheme Pyramid \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.2" \
            -derivedDataPath DerivedData \
            -xcconfig Config/Debug.xcconfig \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: derived-data
          path: ios/DerivedData/Build/Products
          retention-days: 1

      - name: Upload dSYMs to Sentry
        if: github.ref == 'refs/heads/main'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_IOS }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set, skipping dSYM upload"
            exit 0
          fi
          brew install getsentry/tools/sentry-cli
          sentry-cli debug-files upload --include-sources \
            ios/DerivedData/Build/Products

  unit-test:
    name: Unit Tests
    needs: build
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ios/DerivedData/Build/Products

      - name: Unit Test
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Pyramid.xcodeproj \
            -scheme Pyramid \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.2" \
            -derivedDataPath DerivedData \
            -only-testing:PyramidTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

  # ── UI test matrix ──────────────────────────────────────────────────────────
  # Reads test groups from ios/ui-test-manifest.json so new test classes are
  # picked up automatically. Add new tests to the manifest, not here.

  ui-test-matrix:
    name: Prepare UI Test Matrix
    needs: build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read manifest
        id: set-matrix
        run: |
          MATRIX=$(jq -c '{include: [.groups[] | {name: .name, tests: (.tests | join(" "))}]}' ios/ui-test-manifest.json)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  ui-test:
    name: UI Tests (${{ matrix.name }})
    needs: [build, ui-test-matrix]
    runs-on: macos-14
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.ui-test-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ios/DerivedData/Build/Products

      - name: UI Test — ${{ matrix.name }}
        working-directory: ios
        env:
          UI_TEST_EMAIL: ${{ secrets.UI_TEST_EMAIL }}
          UI_TEST_PASSWORD: ${{ secrets.UI_TEST_PASSWORD }}
        run: |
          set -o pipefail
          ONLY_TESTING_ARGS=""
          for test_class in ${{ matrix.tests }}; do
            ONLY_TESTING_ARGS="$ONLY_TESTING_ARGS -only-testing:$test_class"
          done

          xcodebuild test-without-building \
            -project Pyramid.xcodeproj \
            -scheme Pyramid \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.2" \
            -derivedDataPath DerivedData \
            $ONLY_TESTING_ARGS \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/swiftlint
          key: brew-swiftlint-${{ runner.os }}

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        working-directory: ios
        run: swiftlint --strict

  token-check:
    name: Token Freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate tokens
        run: node scripts/generate-tokens.js

      - name: Check for drift
        run: |
          if ! git diff --exit-code ios/Pyramid/Sources/Shared/DesignSystem/ThemeColors.swift \
               ios/Pyramid/Sources/Shared/DesignSystem/ThemeSpacing.swift \
               ios/Pyramid/Sources/Shared/DesignSystem/ThemeTypography.swift; then
            echo "::error::Generated token files are stale. Run 'node scripts/generate-tokens.js' and commit."
            exit 1
          fi

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
