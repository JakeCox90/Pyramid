name: iOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Write dev xcconfig (CI secrets)
        working-directory: ios/Config
        run: |
          echo "SUPABASE_URL = ${{ secrets.SUPABASE_URL_DEV }}" > Debug.xcconfig
          echo "SUPABASE_ANON_KEY = ${{ secrets.SUPABASE_ANON_KEY_DEV }}" >> Debug.xcconfig

      - name: Build
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -project Pyramid.xcodeproj \
            -scheme Pyramid \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.2" \
            -xcconfig Config/Debug.xcconfig \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Test
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project Pyramid.xcodeproj \
            -scheme Pyramid \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.2" \
            -xcconfig Config/Debug.xcconfig \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        working-directory: ios
        run: swiftlint --strict

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
