name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
          key: brew-xcodegen-${{ runner.os }}

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Write dev xcconfig (CI secrets)
        working-directory: ios/Config
        run: |
          echo "SUPABASE_URL = ${{ secrets.SUPABASE_URL_DEV }}" > Debug.xcconfig
          echo "SUPABASE_ANON_KEY = ${{ secrets.SUPABASE_ANON_KEY_DEV }}" >> Debug.xcconfig

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ios/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('ios/project.yml', 'ios/Pyramid/Sources/**/*.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Build for testing
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Pyramid.xcodeproj \
            -scheme Pyramid \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.2" \
            -derivedDataPath DerivedData \
            -xcconfig Config/Debug.xcconfig \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: derived-data
          path: ios/DerivedData/Build/Products
          retention-days: 1

  unit-test:
    name: Unit Tests
    needs: build
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ios/DerivedData/Build/Products

      - name: Unit Test
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Pyramid.xcodeproj \
            -scheme Pyramid \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.2" \
            -derivedDataPath DerivedData \
            -only-testing:PyramidTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

  ui-test:
    name: UI Tests
    needs: build
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ios/DerivedData/Build/Products

      - name: UI Test
        working-directory: ios
        env:
          UI_TEST_EMAIL: ${{ secrets.UI_TEST_EMAIL }}
          UI_TEST_PASSWORD: ${{ secrets.UI_TEST_PASSWORD }}
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Pyramid.xcodeproj \
            -scheme Pyramid \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.2" \
            -derivedDataPath DerivedData \
            -only-testing:PyramidUITests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/swiftlint
          key: brew-swiftlint-${{ runner.os }}

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        working-directory: ios
        run: swiftlint --strict

  token-check:
    name: Token Freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate tokens
        run: node scripts/generate-tokens.js

      - name: Check for drift
        run: |
          if ! git diff --exit-code ios/Pyramid/Sources/Shared/DesignSystem/ThemeColors.swift \
               ios/Pyramid/Sources/Shared/DesignSystem/ThemeSpacing.swift \
               ios/Pyramid/Sources/Shared/DesignSystem/ThemeTypography.swift; then
            echo "::error::Generated token files are stale. Run 'node scripts/generate-tokens.js' and commit."
            exit 1
          fi

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
